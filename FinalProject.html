<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virtual Car</title>

    <script id="vertex-shader" type="x-shader/x-vertex">#version 300 es

        precision mediump float;

        in vec4 vPosition;
        in vec4 vColor;
        in vec4 vNormal;
        in vec4 vSpecularColor;
        in float vSpecularExponent;

        uniform mat4 model_view;
        uniform mat4 projection;

        out vec4 Position;
        out vec4 color;
        out vec4 Normal;
        out vec4 SpecularColor;
        out float SpecularExponent;

        void main() {
            gl_Position = projection * model_view * vPosition;
            Position = vPosition;
            color = vColor;
            Normal = vNormal;
            SpecularColor = vSpecularColor;
            SpecularExponent = vSpecularExponent;
        }

    </script>

    <script id="fragment-shader" type="x-shader/x-fragment">#version 300 es

        precision mediump float;

        in vec4 Position;
        in vec4 color;
        in vec4 Normal;
        in vec4 SpecularColor;
        in float SpecularExponent;

        uniform mat4 model_view;
        uniform mat4 projection;
        uniform vec4 ambient_light;

        uniform vec4 lightPosition[5];
        uniform vec4 lightColor[5];
        uniform vec4 lightDirection[5];
        uniform bool on_off[5];

        out vec4  fColor;

        void main()
        {
            // Phong lighting calculation

            // theta threshold value (30 degrees)
            float cosTheta = cos(radians(30.0));

            vec4 amb = color * ambient_light; // calculate ambient lighting;
            vec4 diff = vec4(0,0,0,1);
            vec4 spec = vec4(0,0,0,1);

            vec4 veyepos = model_view * Position; // get vertex from model to eye space
            vec3 V = normalize(-veyepos.xyz); // vector from surface to camera
            vec3 N = normalize((model_view * Normal).xyz); // normal vector from surface
            vec3 L = vec3(0,0,0);
            vec3 R = vec3(0,0,0);
            for(int i = 0; i < 5; i++) {
                if(!on_off[i]) continue; // skip if light is turned off

                if(i == 1 || i == 2 || i == 3 || i == 4) { // add cutoff for headlights and emergency lights
                                                           // calculate cosine of the angle between the vector from light to surface and light direction vector
                                                           float cosPhi = dot(normalize(veyepos.xyz - lightPosition[i].xyz), normalize(lightDirection[i].xyz));
                                                           if(cosPhi < cosTheta) continue; // skip if outside the cone
                }

                L = normalize(lightPosition[i].xyz - veyepos.xyz); // vector from surface to light
                R = reflect(-L, N); // vector from light source, reflected across Normal

                diff += max(dot(L,N), 0.0) * color * lightColor[i]; // calculate diffuse light

                if(dot(L, N) >= 0.0) { // prevent specular highlights from appearing behind objects
                                       spec += pow(max(dot(R, V), 0.0), SpecularExponent) * SpecularColor * lightColor[i]; // calculate specular light
                }

            }

            fColor = amb + diff + spec; // calculate overall color
        }

    </script>

    <script type="module" src="FinalProject.js"></script>
</head>
<body>
<canvas id="gl-canvas" width="512" height="512">
    Sorry; your web browser doesn't support HTML5's canvas element.
</canvas>
</body>
</html>
